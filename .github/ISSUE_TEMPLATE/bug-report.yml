name: Bug Report
description: Report a problem or unexpected behavior in QR Forge
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve QR Forge.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: Explain the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide clear reproduction steps.
      placeholder: |
        1. Open generator
        2. Upload logo
        3. Export SVG
        4. See issue...
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Brave
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true

  - type: input
    id: qrtype
    attributes:
      label: QR Type
      placeholder: WiFi, URL, vCard, Event...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or additional context
      placeholder: Add screenshots or details if helpful.
